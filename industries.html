<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industries – SS Firms</title>
  <meta name="description" content="SS Firms serves diverse industries including BFSI, Healthcare, Education, Manufacturing, Telecom, Agriculture, and Media & Entertainment." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="images/logo.png" />
</head>
<body class="page-body">

<script src="content.js"></script>
<script src="components.js"></script>

<!-- ============================================================
     PAGE BANNER
     ============================================================ -->
<section class="bg-white border-b border-gray-100 overflow-hidden">
  <div class="w-full flex flex-col md:flex-row items-center justify-between" style="padding-left: max(1.5rem, calc((100vw - 1280px) / 2 + 1.5rem)); padding-right: 0;">
    <div class="w-full md:w-1/2 pt-12 pb-6 md:py-24 text-left">
      <span class="text-xs uppercase tracking-widest text-[#e0194e] font-extrabold block mb-3">SS Firms</span>
      <h1 class="text-4xl md:text-6xl font-extrabold text-[#1a0463] font-serif leading-tight mb-4">Industries</h1>
      <p class="text-gray-600 text-lg mb-8 font-serif">
        We can help you build your business through automation & IT Services.
      </p>
      <a href="#industries-grid" class="inline-block bg-white text-gray-800 font-semibold px-8 py-3 rounded-lg shadow-sm border border-gray-100 hover:shadow-md hover:border-gray-200 transition duration-300">Read More</a>
    </div>
    <div class="w-full md:w-1/2 flex justify-center md:justify-end pb-8 md:pb-0">
      <img src="images/header.png" alt="Industries Illustration" class="w-full max-w-[400px] md:max-w-none md:w-auto h-auto md:h-[450px] object-contain" />
    </div>
  </div>
</section>

<!-- ============================================================
     INDUSTRIES GRID SECTION
     ============================================================ -->
<section id="industries-grid" class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-6">
    <!-- Grid -->
    <div class="grid grid-cols-3 gap-x-2 md:gap-x-8 gap-y-6 md:gap-y-12">
      <!-- Industry 1: Manufacturing -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/image-44.png" alt="Manufacturing" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Manufacturing</h2>
      </div>

      <!-- Industry 2: BFSI -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/image-39-1.png" alt="BFSI" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">BFSI</h2>
      </div>

      <!-- Industry 3: Health Care -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/image-40-1.png" alt="Health Care" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Health Care</h2>
      </div>

      <!-- Industry 4: Education -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/image-41-1.png" alt="Education" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Education</h2>
      </div>

      <!-- Industry 5: Media & Entertainment -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/media-entertainment-img1.png" alt="Media & Entertainment" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Media & Entertainment</h2>
      </div>

      <!-- Industry 6: Telecom -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/telecon-home.png" alt="Telecom" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Telecom</h2>
      </div>

      <!-- Industry 7: Agriculture -->
      <div class="flex flex-col items-center">
        <div class="w-full aspect-[4/3] rounded-xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100">
          <img src="images/Industries/agriculture-home.png" alt="Agriculture" class="w-full h-full object-cover" />
        </div>
        <h2 class="text-[#3b0da8] text-xs sm:text-sm md:text-xl font-bold mt-4 md:mt-6 font-serif text-center">Agriculture</h2>
      </div>
    </div>
  </div>
</section>

</body>
</html>
